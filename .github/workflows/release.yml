#
# Build the `bson-worker` binary for every supported platform and attach the
# archives (+ SHA256 + keyless cosign signature + SLSA provenance) to the GitHub
# Release for a vX.Y.Z tag. The heavy lifting lives in the shared reusable
# workflow Query-farm/vgi-actions/.github/workflows/rust-release.yml; this file
# gates on the repo's own CI suite and supplies the worker-specific inputs.
#
# Assets are named vgi-bson-<tag>-<duckdb_platform>.tar.gz (linux_amd64,
# linux_arm64, osx_amd64, osx_arm64, windows_amd64). The executable inside each
# archive is `bson-worker`, used directly as a DuckDB vgi LOCATION:
#   ATTACH 'bson' (TYPE vgi, LOCATION '/path/to/bson-worker');
#
# Release flow:
#   1. Bump [workspace.package] version in Cargo.toml; sync Cargo.lock.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
name: Release binaries

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Gate the release on the same unit + SQLLogic e2e suite as push/PR.
  # The called ci.yml has an `audit` job that posts a check-run
  # (rustsec/audit-check@v2 → needs checks: write). A reusable-workflow caller
  # job cannot grant its callee more than the caller job holds, and the
  # top-level ceiling here is contents: read — so without this block the audit
  # job's checks: write escalation is rejected and the whole release run fails
  # to start. Grant the scope the callee needs at the caller-job level.
  ci:
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/ci.yml

  release:
    needs: [ci]
    permissions:
      contents: write     # create Release + upload assets
      id-token: write     # keyless cosign sign-blob + provenance (sigstore OIDC)
      attestations: write # SLSA build-provenance attestation
    uses: Query-farm/vgi-actions/.github/workflows/rust-release.yml@v1
    secrets: inherit
    with:
      bin: bson-worker
      asset_prefix: vgi-bson
      version_check_cmd: ci/check-version.sh
